name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check all
        run: bun check-all

      - name: Build
        run: npx next build
        env:
          DATABASE_URL: postgresql://localhost:5432/dummy
          AI_PROVIDER: groq
          GROQ_API_KEY: dummy
